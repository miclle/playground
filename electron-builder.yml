appId: com.miclle.playground
productName: Playground
directories:
  buildResources: resources
  output: dist
files:
  - '!**/.git/*'
  - '!**/.github/*'
  - '!**/.vscode/*'
  - '!**/node_modules/*'
  - '!src/*'
  - '!electron.vite.config.{ts,js,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc,tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.DS_Store,.gitignore,.gitattributes}'
  - '!{LICENSE,README.md}'
  - '!{docs,claude}/**/*'
  - '!{.claude}/**/*'
asarUnpack:
  - resources/**
mac:
  entitlementsInherit: resources/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia64
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
